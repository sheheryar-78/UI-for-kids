<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spin the Wheel Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@600;700;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
font-family:'Inter',sans-serif;
min-height:100vh;
background:#080810;
overflow-x:hidden;
color:#fff;
display:flex;flex-direction:column;align-items:center
}

body::before{
content:'';
position:fixed;inset:0;
background:
radial-gradient(ellipse 40% 50% at 15% 50%,rgba(0,243,255,0.06),transparent),
radial-gradient(ellipse 40% 50% at 85% 20%,rgba(255,0,229,0.05),transparent),
radial-gradient(ellipse 40% 50% at 50% 80%,rgba(139,92,246,0.04),transparent);
pointer-events:none;z-index:0
}

/* ===== HEADER ===== */
.header{
text-align:center;padding:16px 16px 6px;position:relative;z-index:1;width:100%;max-width:1100px
}
.header h1{
font-family:'Orbitron',sans-serif;
font-size:clamp(1.2rem,3.5vw,2rem);font-weight:900;
background:linear-gradient(135deg,#00f3ff,#ff00e5,#ffd700,#00ff87);
background-size:300% 300%;
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
animation:gradS 5s ease infinite;
filter:drop-shadow(0 0 30px rgba(0,243,255,0.15))
}
@keyframes gradS{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.header p{
font-size:clamp(0.65rem,1.4vw,0.8rem);color:rgba(255,255,255,0.25);
letter-spacing:4px;text-transform:uppercase;margin-top:2px
}

/* ===== LAYOUT ===== */
.main{
display:flex;flex-direction:column;align-items:center;gap:10px;
padding:6px 12px 60px;position:relative;z-index:1;width:100%;max-width:1100px
}
@media(min-width:860px){.main{flex-direction:row;align-items:flex-start;gap:20px;padding:10px 20px 60px}}

.wheel-col{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}

.wheel-box{position:relative;width:min(78vw,340px);height:min(78vw,340px)}
@media(min-width:860px){.wheel-box{width:370px;height:370px}}
@media(min-width:1100px){.wheel-box{width:410px;height:410px}}

#wheelCanvas{width:100%;height:100%;border-radius:50%}

.pointer{
position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:10;
width:0;height:0;
border-left:13px solid transparent;border-right:13px solid transparent;
border-top:24px solid #ffd700;
filter:drop-shadow(0 0 15px rgba(255,215,0,0.8)) drop-shadow(0 0 30px rgba(255,215,0,0.3))
}
.pointer::after{
content:'';position:absolute;top:-26px;left:50%;transform:translateX(-50%);
width:10px;height:10px;background:#ffd700;border-radius:50%;
box-shadow:0 0 20px rgba(255,215,0,0.9),0 0 40px rgba(255,215,0,0.3)
}

/* ===== SPIN BUTTON ===== */
.spin-btn{
font-family:'Orbitron',sans-serif;font-weight:700;
font-size:clamp(0.85rem,2vw,1rem);padding:11px 40px;
border:none;border-radius:50px;
background:linear-gradient(135deg,#00f3ff,#8b5cf6);color:#fff;
cursor:pointer;transition:all .3s;
text-transform:uppercase;letter-spacing:2px;
box-shadow:0 0 25px rgba(0,243,255,0.3),0 0 50px rgba(139,92,246,0.12),inset 0 0 20px rgba(255,255,255,0.05);
position:relative;overflow:hidden;
}
.spin-btn::before{
content:'';position:absolute;inset:-2px;
background:linear-gradient(135deg,#00f3ff,#ff00e5,#ffd700,#00ff87);
background-size:300% 300%;border-radius:52px;z-index:-1;
animation:borderPulse 3s ease infinite;opacity:0;transition:opacity .4s
}
.spin-btn:hover::before{opacity:1}
.spin-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 0 40px rgba(0,243,255,0.5),0 0 80px rgba(139,92,246,0.2)}
.spin-btn:active{transform:translateY(0) scale(.97)}
.spin-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
@keyframes borderPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

.seg-display{
text-align:center;padding:8px 16px;min-height:40px;
display:flex;align-items:center;justify-content:center;gap:8px;
background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;
width:100%;max-width:340px
}
.seg-name{font-weight:700;font-size:clamp(0.9rem,2.2vw,1.1rem);
background:linear-gradient(90deg,#ffd700,#ff00e5);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ===== SIDE ===== */
.side{flex:1;width:100%;max-width:500px;display:flex;flex-direction:column;gap:8px}

.glass{
background:rgba(255,255,255,0.02);
backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.06);
border-radius:14px;padding:12px 16px
}
.glass-title{
font-family:'Orbitron',sans-serif;
font-size:clamp(0.55rem,1.3vw,0.65rem);font-weight:700;
text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.25);margin-bottom:8px
}

/* ===== TIMER ===== */
.timer-row{display:flex;align-items:center;gap:12px}
.timer-num{
font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,3vw,1.6rem);font-weight:700;
min-width:42px;text-align:center;color:rgba(255,255,255,0.8)
}
.track{flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.track-fill{height:100%;width:100%;background:linear-gradient(90deg,#00ff87,#ffd700);border-radius:3px;transition:width .3s linear}
.track-fill.amber{background:linear-gradient(90deg,#ff8800,#ffd700)}
.track-fill.red{background:linear-gradient(90deg,#ff0055,#ff00e5)!important}
.timer-num.warn{color:#ff0055!important;animation:pulseT .4s ease infinite}
@keyframes pulseT{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== TEAMS ===== */
.team-list{display:flex;flex-direction:column;gap:5px}
.team-row{
display:flex;align-items:center;gap:8px;
padding:6px 10px;border-radius:10px;
background:rgba(255,255,255,0.01);
border:1px solid transparent;transition:all .3s;
}
.team-row.active{
background:rgba(0,243,255,0.06);border-color:rgba(0,243,255,0.15);
box-shadow:0 0 20px rgba(0,243,255,0.06)
}
.team-row.leader{border-color:rgba(255,215,0,0.12)}
.team-row.leader .team-emoji{filter:drop-shadow(0 0 6px rgba(255,215,0,0.4))}
.team-emoji{font-size:1.2rem;min-width:28px;text-align:center;cursor:pointer;user-select:none}
.team-inp{
background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.08);
color:#fff;font-family:inherit;font-size:clamp(0.8rem,1.8vw,0.9rem);
font-weight:600;padding:2px 4px;outline:none;min-width:55px;flex:1;max-width:110px;
transition:border-color .3s
}
.team-inp:focus{border-bottom-color:#00f3ff}
.team-inp::placeholder{color:rgba(255,255,255,0.15)}

.score-area{display:flex;align-items:center;gap:4px;margin-left:auto}
.score-num{
font-family:'Orbitron',sans-serif;font-weight:700;
font-size:clamp(0.9rem,2vw,1.05rem);color:#ffd700;
width:40px;text-align:center;background:transparent;border:none;outline:none;
padding:2px;border-bottom:1px solid transparent;
-moz-appearance:textfield
}
.score-num::-webkit-inner-spin-button,.score-num::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.score-num:focus{border-bottom-color:rgba(255,215,0,0.25)}
.sc-btn{
width:24px;height:24px;border-radius:6px;border:none;
background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);
font-size:.7rem;font-weight:700;cursor:pointer;
display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1
}
.sc-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.sc-btn.p:hover{background:rgba(0,255,135,0.12);color:#00ff87}
.sc-btn.m:hover{background:rgba(255,0,85,0.12);color:#ff0055}
.sc-btn.b{width:28px}

.turn-badge{
font-size:clamp(0.75rem,1.5vw,0.85rem);padding:5px 16px;border-radius:16px;
background:rgba(0,243,255,0.06);border:1px solid rgba(0,243,255,0.1);
display:inline-flex;align-items:center;gap:6px;margin-top:5px
}

/* ===== MODAL ===== */
.modal{
position:fixed;inset:0;
background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
z-index:1000;display:none;align-items:center;justify-content:center;padding:16px
}
.modal.open{display:flex}

.card{
background:linear-gradient(145deg,#0c0c1e,#11082a);
border:1px solid rgba(0,243,255,0.08);border-radius:20px;
padding:26px 22px;max-width:520px;width:100%;
position:relative;overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 40px rgba(0,243,255,0.03);
animation:cardUp .35s ease
}
@keyframes cardUp{from{transform:translateY(30px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.card::before{
content:'';position:absolute;inset:-50%;
background:conic-gradient(from 0deg,transparent,rgba(0,243,255,0.03),transparent,rgba(139,92,246,0.03),transparent);
animation:bgSpin 10s linear infinite;pointer-events:none
}
@keyframes bgSpin{to{transform:rotate(360deg)}}
.card>*{position:relative;z-index:1}

.card-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.card-h .ci{font-size:1.8rem}
.card-h .cs{font-family:'Orbitron',sans-serif;font-size:.55rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.2)}
.card-h h2{font-size:clamp(1rem,2.6vw,1.25rem);font-weight:800}

.card-q{font-size:clamp(1rem,2.4vw,1.18rem);line-height:1.5;margin:10px 0 14px;color:rgba(255,255,255,0.82)}

/* Options */
.opts{display:flex;flex-direction:column;gap:6px;margin:10px 0}
.opt{
padding:10px 14px;border-radius:10px;
border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);
color:#fff;font-size:clamp(.85rem,2vw,.95rem);font-family:inherit;
cursor:pointer;transition:all .25s;text-align:left
}
.opt:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.12)}
.opt.ok{background:rgba(0,255,135,0.12);border-color:#00ff87;color:#00ff87}
.opt.no{background:rgba(255,0,85,0.12);border-color:#ff0055;color:#ff0055}
.opt.show{background:rgba(0,243,255,0.08);border-color:#00f3ff}
.opt:disabled{cursor:not-allowed}

/* Answer box */
.ans-box{
margin:10px 0;padding:12px 16px;border-radius:10px;
background:rgba(0,243,255,0.04);border:1px solid rgba(0,243,255,0.08);
display:none
}
.ans-box.open{display:block}
.ans-box .al{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.25);margin-bottom:4px}
.ans-box .av{color:#00f3ff;font-weight:700;font-size:1rem}

/* Card acts */
.c-acts{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.c-acts button{
padding:8px 18px;border-radius:10px;border:none;
font-family:inherit;font-weight:700;font-size:.85rem;
cursor:pointer;transition:all .25s
}
.btn-p{background:linear-gradient(135deg,#00f3ff,#8b5cf6);color:#fff;box-shadow:0 0 15px rgba(0,243,255,.15)}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 0 25px rgba(0,243,255,.3)}
.btn-g{background:linear-gradient(135deg,#ffd700,#ff8800);color:#080810;box-shadow:0 0 15px rgba(255,215,0,.15)}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 0 25px rgba(255,215,0,.3)}
.btn-gh{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.06)}
.btn-gh:hover{background:rgba(255,255,255,0.08);color:#fff}
.btn-v{background:rgba(0,255,135,0.08);color:#00ff87;border:1px solid rgba(0,255,135,0.1)}
.btn-v:hover{background:rgba(0,255,135,0.14)}

.msg{margin:8px 0;padding:8px 14px;border-radius:10px;font-size:.9rem;font-weight:600;text-align:center}
.msg.ok{background:rgba(0,255,135,0.08);border:1px solid rgba(0,255,135,0.1);color:#00ff87}
.msg.no{background:rgba(255,0,85,0.08);border:1px solid rgba(255,0,85,0.1);color:#ff0055}
.msg.info{background:rgba(0,243,255,0.06);border:1px solid rgba(0,243,255,0.08);color:#00f3ff}

/* ===== EMOJI ===== */
.emoji-big{font-size:clamp(2.5rem,7vw,4rem);text-align:center;margin:12px 0;letter-spacing:8px}
.emoji-inp{
width:100%;padding:10px 14px;border-radius:10px;
border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);
color:#fff;font-family:inherit;font-size:.95rem;outline:none;transition:border-color .3s
}
.emoji-inp:focus{border-color:rgba(0,243,255,0.25)}
.hint{font-size:.8rem;color:rgba(255,255,255,0.25);font-style:italic;margin-top:4px}

/* ===== RF ===== */
.rf-q{padding:10px;margin:6px 0;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04)}
.rf-l{font-weight:600;margin-bottom:4px;font-size:.85rem}
.rf-o{display:flex;gap:5px;flex-wrap:wrap}
.rf-o button{padding:4px 12px;border-radius:7px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#fff;cursor:pointer;font-family:inherit;font-size:.78rem;transition:all .2s}
.rf-o button:hover{background:rgba(255,255,255,0.07)}
.rf-o button.ok{background:rgba(0,255,135,0.12);border-color:#00ff87}
.rf-o button.no{background:rgba(255,0,85,0.12);border-color:#ff0055}

/* Bonus */
.bonus{text-align:center;padding:24px 16px}
.bonus .bi{font-size:4rem;margin-bottom:8px;display:block}
.bonus .bt{font-size:1.15rem}

/* ===== POPUP ===== */
.pts-pop{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
font-family:'Orbitron',sans-serif;
font-size:clamp(3rem,9vw,5.5rem);font-weight:900;
color:#ffd700;
text-shadow:0 0 30px rgba(255,215,0,0.6),0 0 60px rgba(255,215,0,0.25),0 0 100px rgba(255,215,0,0.1);
z-index:10000;pointer-events:none;
animation:popGo 1.3s ease forwards
}
@keyframes popGo{
0%{opacity:0;transform:translate(-50%,-50%) scale(.2)}
20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
50%{opacity:1;transform:translate(-50%,-50%) scale(1)}
100%{opacity:0;transform:translate(-50%,-65%) scale(1.05)}
}

/* ===== CONFETTI ===== */
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}

/* ===== SCROLL ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.05);border-radius:2px}

@media(max-width:859px){
.main{gap:8px;padding:6px 8px 50px}
.glass{padding:10px 10px}
.team-inp{max-width:70px;font-size:.78rem}
.team-emoji{font-size:1rem;min-width:22px}
.card{padding:18px 14px}
.c-acts button{font-size:.78rem;padding:7px 12px}
.sc-btn{width:22px;height:22px;font-size:.65rem}
.score-num{width:34px;font-size:.85rem}
.sc-btn.b{width:26px}
}
@media(max-width:360px){
.wheel-box{width:90vw;height:90vw}
.team-inp{max-width:55px;font-size:.72rem}
.score-num{width:28px;font-size:.78rem}
}
</style>
</head>
<body>

<header class="header">
<h1>🎡 SPIN THE WHEEL</h1>
<p>Challenge &bull; Compete &bull; Conquer</p>
</header>

<div class="main">
<div class="wheel-col">
<div class="wheel-box">
<canvas id="wheelCanvas"></canvas>
<div class="pointer"></div>
</div>
<button class="spin-btn" id="spinBtn">▶ SPIN</button>
<div class="seg-display" id="segDisp"><span style="color:rgba(255,255,255,0.2);font-size:.8rem">Press SPIN to go!</span></div>
</div>

<div class="side">
<div class="glass">
<div class="glass-title">⏱ Timer</div>
<div class="timer-row">
<span class="timer-num" id="timerNum">--</span>
<div class="track"><div class="track-fill" id="timerFill"></div></div>
</div>
</div>

<div class="glass">
<div class="glass-title">👥 Teams</div>
<div class="team-list" id="teamList"></div>
<div style="text-align:center;margin-top:6px"><span class="turn-badge">🎯 <span id="curTeam">Alpha</span>'s Turn</span></div>
</div>
</div>
</div>

<div class="modal" id="modal">
<div class="card" id="card">
<div class="card-h">
<span class="ci" id="cardIcon">🎯</span>
<div>
<div class="cs" id="cardSub">CATEGORY</div>
<h2 id="cardTitle">Title</h2>
</div>
</div>
<div id="cardBody"></div>
<div id="cardRes"></div>
<div class="c-acts" id="cardActs"></div>
</div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>

];

let sz=0;
function setupCv(){
const r=cv.parentElement.getBoundingClientRect();sz=r.width;

function drawWheel(r){
const s=sz,rad=s/2-5,sa=2*Math.PI/CATS.length;
cx.clearRect(0,0,s,s);cx.save();cx.translate(s/2,s/2);cx.rotate(r);
for(let i=0;i<CATS.length;i++){
const st=-Math.PI/2+i*sa,en=st+sa;
const g=cx.createRadialGradient(0,0,0,0,0,rad);
g.addColorStop(0,lt(COLS[i],40));g.addColorStop(1,COLS[i]);
cx.beginPath();cx.moveTo(0,0);cx.arc(0,0,rad,st,en);cx.closePath();
cx.fillStyle=g;cx.fill();
cx.strokeStyle='rgba(255,255,255,0.06)';cx.lineWidth=1;cx.stroke();
cx.save();cx.rotate(st+sa/2);cx.textAlign='right';
cx.fillStyle='#fff';
cx.font=`bold ${s*0.04}px 'Inter',sans-serif`;
const tr=rad*0.68,lines=wrap(CATS[i].name,s*0.05);
for(let j=0;j<lines.length;j++)cx.fillText(lines[j],tr,(j-(lines.length-1)/2)*s*0.042);
cx.restore()
}
const g2=cx.createRadialGradient(0,0,0,0,0,rad*0.18);
g2.addColorStop(0,'#11082a');g2.addColorStop(0.5,'#0c0c1e');g2.addColorStop(1,'#080810');
cx.beginPath();cx.arc(0,0,rad*0.18,0,2*Math.PI);
cx.fillStyle=g2;cx.fill();
cx.strokeStyle='rgba(255,215,0,0.15)';cx.lineWidth=2;cx.stroke();
cx.fillStyle='#ffd700';cx.font=`bold ${s*0.06}px 'Orbitron',sans-serif`;
cx.textAlign='center';cx.textBaseline='middle';
cx.shadowColor='rgba(255,215,0,0.3)';cx.shadowBlur=15;
cx.fillText('SPIN',0,-s*0.008);cx.shadowBlur=0;
cx.fillStyle='rgba(255,255,255,0.12)';cx.font=`${s*0.025}px 'Inter',sans-serif`;
cx.fillText('THE WHEEL',0,s*0.055);
cx.restore();
cx.save();cx.translate(s/2,s/2);
for(let i=0;i<32;i++){
const a=i/32*2*Math.PI,x=(rad-2)*Math.cos(a),y=(rad-2)*Math.sin(a);
cx.beginPath();cx.arc(x,y,1.2,0,2*Math.PI);
cx.fillStyle=i%2===0?'rgba(255,215,0,0.15)':'rgba(255,255,255,0.05)';cx.fill()
}
cx.restore()
}
function lt(h,p){
const n=parseInt(h.replace('#',''),16),a=Math.round(2.55*p);
return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`
}
function wrap(t,w){
const ws=t.split(' '),ls=[];let c='';
for(const w of ws){if((c+' '+w).length*7>w&&c){ls.push(c);c=w}else c=c?c+' '+w:w}
if(c)ls.push(c);return ls.length?ls:[t]
}

const ta=-Math.PI/2-(ti+0.5)*sa,fr=(5+Math.floor(Math.random()*4))*2*Math.PI;
const total=fr+ta-(rot%(2*Math.PI)),start=rot,target=start+total;
const dur=4000+Math.random()*1000,t0=performance.now();
sndSpin();
function anim(t){
const p=Math.min((t-t0)/dur,1),e=1-Math.pow(1-p,3);
rot=start+total*e;drawWheel(rot);
const passed=Math.floor((rot-start)/sa),prev=Math.floor(((rot-sa*0.5)-start)/sa);
if(passed>prev&&p<.95)sndTick();
if(p<1)requestAnimationFrame(anim);
else{rot=target;drawWheel(rot);done(ti)}
}
requestAnimationFrame(anim)
}

spin=false;sb.disabled=false;sb.textContent='▶ SPIN';sndLand();

cr.innerHTML=`<div class="msg ok">+5 points!</div>`;award(5);clrT();this.disabled=true;
document.getElementById('egA').classList.add('open');
ca.innerHTML=`<button class="btn-g" onclick="closeM();act=false;adv()">Continue</button>`
}else{
inp.style.borderColor='#ff0055';cr.innerHTML=`<div class="msg no">Try again!</div>`;
setTimeout(()=>inp.style.borderColor='rgba(255,255,255,0.06)',1200)
}
});
document.getElementById('eRev').addEventListener('click',function(){document.getElementById('egA').classList.toggle('open')});
document.getElementById('eSkip').onclick=()=>{closeM();act=false;adv()};
startT(25,()=>{document.getElementById('eSub').disabled=true;document.getElementById('egA').classList.add('open');cr.innerHTML=`<div class="msg no">Answer: ${e.a}</div>`;ca.innerHTML=`<button class="btn-g" onclick="closeM();act=false;adv()">Continue</button>`})
}
// ===== MYSTERY =====
function showMX(){
const m=MX[Math.floor(Math.random()*MX.length)];
ctit.textContent='🎁 Mystery Box!';
cb.innerHTML=`<div class="bonus"><span class="bi" style="animation:bounceB .5s ease infinite alternate">🎁</span><span class="bt">Click to reveal!</span></div><style>@keyframes bounceB{from{transform:translateY(0)}to{transform:translateY(-8px)}}</style>`;
cr.innerHTML='';
ca.innerHTML=`<button class="btn-g" id="openMx">Open!</button>`;
document.getElementById('openMx').addEventListener('click',function(){
this.disabled=true;this.textContent='Opening...';
if(m.sp==='dbl'){cr.innerHTML=`<div class="msg info">Double Next Score!</div>`;dbl=true}
else if(m.sp==='ext'){cr.innerHTML=`<div class="msg info">Extra Turn!</div>`;ext=true}
else{award(m.pts);cr.innerHTML=`<div class="msg ok">${m.text}</div>`}
ca.innerHTML=`<button class="btn-g" onclick="closeM();act=false;adv()">Continue</button>`
})
}

// ===== POINTS =====
function award(p){
teams[cur].score+=p;renderT();sndWin();confetti();ptsPop(`+${p}`)
}
function ptsPop(t){
const e=document.createElement('div');e.className='pts-pop';e.textContent=t;
document.body.appendChild(e);setTimeout(()=>e.remove(),1400)
}
function renderT(){
tl.innerHTML='';
teams.forEach((t,i)=>{
const r=document.createElement('div');
r.className='team-row'+(i===cur?' active':'')+(isLdr(i)?' leader':'');
const em=document.createElement('span');em.className='team-emoji';em.textContent=t.emo;
const inp=document.createElement('input');inp.className='team-inp';inp.value=t.name;
inp.placeholder='Name';inp.maxLength=16;
inp.addEventListener('input',()=>{t.name=inp.value||'?';updTurn()});
const sa=document.createElement('div');sa.className='score-area';
const sc=document.createElement('input');sc.type='number';sc.className='score-num';sc.value=t.score;
sc.addEventListener('input',()=>{t.score=parseInt(sc.value)||0;renderT()});
const m5=btn('-5','m b',()=>{t.score=Math.max(0,t.score-5);renderT()});
const m1=btn('-1','m',()=>{t.score=Math.max(0,t.score-1);renderT()});
const p1=btn('+1','p',()=>{t.score+=1;renderT()});
const p5=btn('+5','p b',()=>{t.score+=5;renderT()});
sa.append(m5,m1,sc,p1,p5);
r.append(em,inp,sa);tl.appendChild(r)
});
const mx=Math.max(...teams.map(t=>t.score));
document.querySelectorAll('.team-row').forEach((r,i)=>{if(mx>0&&teams[i].score===mx)r.classList.add('leader')});
updTurn()
}
function btn(t,c,f){
const b=document.createElement('button');b.className=`sc-btn ${c}`;b.textContent=t;
b.addEventListener('click',f);return b
}
function isLdr(i){const mx=Math.max(...teams.map(t=>t.score));return mx>0&&teams[i].score===mx}
function updTurn(){ct.textContent=`${teams[cur].emo} ${teams[cur].name}`}
function adv(){
if(ext){ext=false;return}
dbl=false;cur=(cur+1)%teams.length;updTurn();
sd.innerHTML=`<span style="color:rgba(255,255,255,0.2);font-size:.8rem">🎯 ${teams[cur].emo} ${teams[cur].name}'s turn!</span>`
}

// ===== TIMER =====
let tmr=null;
function startT(sec,onEnd){
clrT();let r=sec;
tn.textContent=r;tn.className='timer-num';
tf.style.width='100%';tf.className='track-fill';
tmr=setInterval(()=>{
r--;tn.textContent=r;tf.style.width=(r/sec)*100+'%';
if(r<=5){tn.classList.add('warn');tf.classList.add('red')}
else if(r<=10){tf.classList.add('amber')}
if(r<=0){clrT();onEnd()}
},1000)
}
function clrT(){
if(tmr){clearInterval(tmr);tmr=null}
tn.textContent='--';tn.className='timer-num';
tf.style.width='100%';tf.className='track-fill'
}
function timeUp(){cr.innerHTML=`<div class="msg no">Time's up!</div>`;ca.innerHTML=`<button class="btn-g" onclick="closeM();act=false;adv()">Continue</button>`}

// ===== SOUNDS =====
let actx=null;
function ax(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx}
function sndSpin(){try{
const c=ax(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
o.type='sawtooth';o.frequency.setValueAtTime(300,c.currentTime);
o.frequency.exponentialRampToValueAtTime(1200,c.currentTime+.3);
o.frequency.exponentialRampToValueAtTime(400,c.currentTime+.6);
g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.6);
o.start(c.currentTime);o.stop(c.currentTime+.6)
}catch(e){}}
function sndTick(){try{
const c=ax(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
o.type='sine';o.frequency.setValueAtTime(2000,c.currentTime);
g.gain.setValueAtTime(.025,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.04);
o.start(c.currentTime);o.stop(c.currentTime+.04)
}catch(e){}}
function sndWin(){try{
const c=ax();[523.25,659.25,783.99,1046.5].forEach((f,i)=>{
const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
o.type='sine';o.frequency.setValueAtTime(f,c.currentTime+i*.12);
g.gain.setValueAtTime(0,c.currentTime+i*.12);
g.gain.linearRampToValueAtTime(.09,c.currentTime+i*.12+.04);
g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.12+.18);
o.start(c.currentTime+i*.12);o.stop(c.currentTime+i*.12+.18)
})
}catch(e){}}
function sndLand(){try{
const c=ax();
const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
o.type='triangle';o.frequency.setValueAtTime(440,c.currentTime);
o.frequency.exponentialRampToValueAtTime(880,c.currentTime+.12);
g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);
o.start(c.currentTime);o.stop(c.currentTime+.25);
const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);
o2.type='sine';o2.frequency.setValueAtTime(100,c.currentTime+.08);
g2.gain.setValueAtTime(.15,c.currentTime+.08);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);
o2.start(c.currentTime+.08);o2.stop(c.currentTime+.25)
}catch(e){}}

// ===== CONFETTI =====
let pieces=[],aid=null;
function confetti(n=100){
setupCc();
for(let i=0;i<n;i++)pieces.push({
x:Math.random()*ccv.width,y:Math.random()*ccv.height*-1-10,
w:3+Math.random()*7,h:3+Math.random()*4,
vx:(Math.random()-.5)*4,vy:1.5+Math.random()*4,
color:['#ff0055','#8b5cf6','#00f3ff','#ffd700','#ff6a00','#00ff87','#06b6d4','#7c3aed','#f472b6'][Math.floor(Math.random()*9)],
rot:Math.random()*360,rs:(Math.random()-.5)*14,op:1,g:.05+Math.random()*.04
});
if(!aid)animC()
}
function animC(){
cctx.clearRect(0,0,ccv.width,ccv.height);let alive=false;
for(const p of pieces){
p.x+=p.vx;p.vy+=p.g;p.y+=p.vy;p.rot+=p.rs;p.op-=.0035;
if(p.op>0&&p.y<ccv.height+20){
alive=true;cctx.save();cctx.translate(p.x,p.y);
cctx.rotate(p.rot*Math.PI/180);cctx.globalAlpha=Math.max(0,p.op);
cctx.fillStyle=p.color;cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cctx.restore()
}
}
pieces=pieces.filter(p=>p.op>0&&p.y<ccv.height+20);
if(alive||pieces.length)aid=requestAnimationFrame(animC);
else{aid=null;cctx.clearRect(0,0,ccv.width,ccv.height)}
}

// ===== EVENTS =====
window.addEventListener('resize',()=>{setupCv();setupCc()});
document.addEventListener('click',()=>ax(),{once:true});
sb.addEventListener('click',doSpin);
cv.addEventListener('click',()=>{if(!spin&&!act)doSpin()});
mw.addEventListener('click',function(e){
if(e.target===this&&!spin&&act){
if(cs.textContent.toLowerCase().includes('double')||cs.textContent.toLowerCase().includes('rapid'))return;
closeM();act=false;adv()
}
});

// ===== INIT =====
function init(){setupCv();setupCc();renderT();tn.textContent='--';
sd.innerHTML=`<span style="color:rgba(255,255,255,0.2);font-size:.8rem">🎯 ${teams[0].emo} ${teams[0].name}'s turn!</span>`}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
