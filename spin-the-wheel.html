<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Spin the Wheel Challenge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Orbitron:wght@400;700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: 'Nunito', sans-serif;
min-height: 100vh;
background: linear-gradient(135deg, #0a0a1a 0%, #1a0533 40%, #0d1b2a 100%);
overflow-x: hidden;
color: #fff;
}

body::before {
content: '';
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background:
radial-gradient(ellipse at 15% 50%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
radial-gradient(ellipse at 85% 20%, rgba(255, 45, 120, 0.06) 0%, transparent 50%),
radial-gradient(ellipse at 50% 80%, rgba(0, 255, 136, 0.04) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

.header {
text-align: center;
padding: 14px 10px 4px;
position: relative;
z-index: 1;
}
.header h1 {
font-family: 'Orbitron', sans-serif;
font-size: clamp(1.2rem, 3.5vw, 2rem);
font-weight: 900;
background: linear-gradient(90deg, #00d4ff, #ff2d78, #ffd700, #00ff88, #00d4ff);
background-size: 300% 100%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: shiftGrad 4s ease infinite;
filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.25));
}
@keyframes shiftGrad {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}
.header p {
font-size: clamp(0.7rem, 1.6vw, 0.85rem);
color: rgba(255,255,255,0.35);
letter-spacing: 3px;
text-transform: uppercase;
margin-top: 1px;
}

.main-grid {
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
padding: 6px 10px 70px;
position: relative;
z-index: 1;
max-width: 1100px;
margin: 0 auto;
}
@media (min-width: 820px) {
.main-grid { flex-direction: row; align-items: flex-start; gap: 16px; padding: 10px 16px 70px; }
}

.wheel-col { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }

.wheel-wrap {
position: relative;
width: min(80vw, 340px);
height: min(80vw, 340px);
}
@media (min-width: 820px) { .wheel-wrap { width: 360px; height: 360px; } }
@media (min-width: 1100px) { .wheel-wrap { width: 400px; height: 400px; } }

#wheelCanvas {
width: 100%;
height: 100%;
border-radius: 50%;
box-shadow: 0 0 30px rgba(0, 212, 255, 0.15), 0 0 60px rgba(255, 45, 120, 0.08);
}

.pointer {
position: absolute;
top: -12px; left: 50%;
transform: translateX(-50%);
z-index: 10;
width: 0; height: 0;
border-left: 14px solid transparent;
border-right: 14px solid transparent;
border-top: 26px solid #ffd700;
filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.7));
}
.pointer::after {
content: '';
position: absolute;
top: -30px; left: 50%;
transform: translateX(-50%);
width: 10px; height: 10px;
background: #ffd700;
border-radius: 50%;
box-shadow: 0 0 18px rgba(255, 215, 0, 0.8);
}

.spin-btn {
font-family: 'Orbitron', sans-serif;
font-weight: 700;
font-size: clamp(0.85rem, 2.2vw, 1rem);
padding: 10px 36px;
border: none;
border-radius: 50px;
background: linear-gradient(135deg, #00d4ff, #7c3aed);
color: #fff;
cursor: pointer;
transition: all 0.3s;
text-transform: uppercase;
letter-spacing: 2px;
box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), 0 0 40px rgba(124, 58, 237, 0.15);
position: relative;
overflow: hidden;
}
.spin-btn::before {
content: '';
position: absolute;
inset: -2px;
background: linear-gradient(135deg, #00d4ff, #ff2d78, #ffd700, #00ff88);
background-size: 300% 300%;
border-radius: 52px;
z-index: -1;
animation: glowSpin 3s ease infinite;
opacity: 0;
transition: opacity 0.3s;
}
.spin-btn:hover::before { opacity: 1; }
.spin-btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 0 35px rgba(0, 212, 255, 0.5); }
.spin-btn:active { transform: translateY(0) scale(0.97); }
.spin-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

@keyframes glowSpin {
0%, 100% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
}

.segment-display {
text-align: center;
padding: 8px 16px;
min-height: 42px;
display: flex;
align-items: center;
justify-content: center;
background: rgba(255,255,255,0.04);
border: 1px solid rgba(255,255,255,0.06);
border-radius: 12px;
width: 100%;
max-width: 340px;
}
.seg-icon { font-size: 1.5rem; margin-right: 8px; }
.seg-name {
font-weight: 700;
font-size: clamp(0.95rem, 2.4vw, 1.15rem);
background: linear-gradient(90deg, #ffd700, #ff2d78);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}

/* Side panel */
.side-col { flex: 1; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 8px; }

.glass {
background: rgba(255, 255, 255, 0.03);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
border: 1px solid rgba(255, 255, 255, 0.07);
border-radius: 14px;
padding: 12px 14px;
}
.glass-title {
font-family: 'Orbitron', sans-serif;
font-size: clamp(0.6rem, 1.5vw, 0.7rem);
font-weight: 700;
text-transform: uppercase;
letter-spacing: 2px;
color: rgba(255,255,255,0.35);
margin-bottom: 6px;
}

/* Timer */
.timer-row { display: flex; align-items: center; gap: 10px; }
.timer-num {
font-family: 'Orbitron', sans-serif;
font-size: 1.6rem;
font-weight: 700;
min-width: 44px;
text-align: center;
}
.track { flex: 1; height: 7px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
.track-fill {
height: 100%;
width: 100%;
background: linear-gradient(90deg, #00ff88, #ffd700);
border-radius: 4px;
transition: width 0.3s linear;
}
.track-warn { color: #ff2d78 !important; animation: pulse 0.5s ease infinite; }
.track-fill-danger { background: linear-gradient(90deg, #ff2d78, #ff6b6b) !important; }
.track-fill-warn { background: linear-gradient(90deg, #ff8800, #ff2d78) !important; }

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

/* Teams */
.team-list { display: flex; flex-direction: column; gap: 4px; }
.team-row {
display: flex; align-items: center; gap: 6px;
padding: 5px 8px;
border-radius: 10px;
background: rgba(255,255,255,0.02);
border: 1px solid transparent;
transition: all 0.3s;
}
.team-row.active {
background: rgba(0, 212, 255, 0.08);
border-color: rgba(0, 212, 255, 0.2);
box-shadow: 0 0 12px rgba(0, 212, 255, 0.06);
}
.team-row.leader-row { border-color: rgba(255, 215, 0, 0.15); }

.team-emoji { font-size: 1.2rem; min-width: 28px; text-align: center; cursor: pointer; }
.team-emoji:hover { filter: brightness(1.3); }

.team-name-input {
background: transparent;
border: none;
border-bottom: 1px dashed rgba(255,255,255,0.12);
color: #fff;
font-family: inherit;
font-size: clamp(0.8rem, 1.8vw, 0.9rem);
font-weight: 600;
padding: 2px 4px;
outline: none;
min-width: 60px;
flex: 1;
max-width: 120px;
transition: border-color 0.3s;
}
.team-name-input:focus { border-bottom-color: #00d4ff; }
.team-name-input::placeholder { color: rgba(255,255,255,0.2); }

.score-group { display: flex; align-items: center; gap: 3px; margin-left: auto; }
.team-score {
font-family: 'Orbitron', sans-serif;
font-weight: 700;
font-size: clamp(0.9rem, 2vw, 1.05rem);
color: #ffd700;
min-width: 36px;
text-align: center;
background: transparent;
border: none;
color: #ffd700;
font-family: 'Orbitron', sans-serif;
font-weight: 700;
font-size: clamp(0.9rem, 2vw, 1.05rem);
width: 44px;
text-align: center;
outline: none;
padding: 2px;
border-bottom: 1px dashed transparent;
transition: border-color 0.3s;
}
.team-score:focus { border-bottom-color: rgba(255, 215, 0, 0.3); }
.team-score::-webkit-inner-spin-button, .team-score::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

.score-btn {
width: 24px; height: 24px;
border-radius: 6px;
border: none;
background: rgba(255,255,255,0.06);
color: rgba(255,255,255,0.6);
font-size: 0.75rem;
font-weight: 700;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: all 0.2s;
line-height: 1;
}
.score-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.score-btn.plus:hover { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
.score-btn.minus:hover { background: rgba(255, 45, 120, 0.2); color: #ff2d78; }
.score-btn.big { width: 28px; }
.score-btn.ok {
width: auto; padding: 0 12px;
background: rgba(0, 212, 255, 0.15);
color: #00d4ff;
font-size: 0.7rem;
font-family: 'Orbitron', sans-serif;
letter-spacing: 1px;
}
.score-btn.ok:hover { background: rgba(0, 212, 255, 0.25); }

.turn-badge {
text-align: center;
font-size: clamp(0.75rem, 1.6vw, 0.85rem);
padding: 5px 14px;
border-radius: 16px;
background: rgba(0, 212, 255, 0.08);
border: 1px solid rgba(0, 212, 255, 0.12);
display: inline-flex;
align-items: center;
gap: 6px;
margin-top: 4px;
}

/* Conffeti */
#confettiCanvas {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
pointer-events: none; z-index: 9999;
}

/* Modal */
.modal-wrap {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.65);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
z-index: 1000;
display: none;
align-items: center;
justify-content: center;
padding: 16px;
}
.modal-wrap.open { display: flex; }

.challenge-card {
background: linear-gradient(145deg, #0d0d2b, #1a0a30);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 20px;
padding: 24px 20px;
max-width: 500px;
width: 100%;
position: relative;
overflow: hidden;
box-shadow: 0 30px 80px rgba(0,0,0,0.6);
animation: rise 0.35s ease;
}
@keyframes rise { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.challenge-card::before {
content: '';
position: absolute;
inset: -50%;
background: conic-gradient(from 0deg, transparent, rgba(0,212,255,0.04), transparent, rgba(255,45,120,0.04), transparent);
animation: spinBg 8s linear infinite;
pointer-events: none;
}
@keyframes spinBg { to { transform: rotate(360deg); } }

.challenge-card > * { position: relative; z-index: 1; }

.card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.card-head .big-icon { font-size: 1.8rem; }
.card-head .sub { font-family: 'Orbitron', sans-serif; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.3); }
.card-head h2 { font-size: clamp(1rem, 2.6vw, 1.25rem); font-weight: 800; }

.card-q {
font-size: clamp(1rem, 2.5vw, 1.2rem);
line-height: 1.5;
margin: 10px 0 14px;
color: rgba(255,255,255,0.85);
}

/* Options */
.opts { display: flex; flex-direction: column; gap: 6px; margin: 10px 0; }
.opt-btn {
padding: 9px 14px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.08);
background: rgba(255,255,255,0.04);
color: #fff;
font-size: clamp(0.85rem, 2vw, 0.95rem);
font-family: inherit;
cursor: pointer;
transition: all 0.25s;
text-align: left;
}
.opt-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
.opt-btn.correct { background: rgba(0, 255, 136, 0.15); border-color: #00ff88; color: #00ff88; }
.opt-btn.wrong { background: rgba(255, 45, 120, 0.15); border-color: #ff2d78; color: #ff2d78; }
.opt-btn.reveal { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; }
.opt-btn:disabled { cursor: not-allowed; }

/* Answer reveal box */
.answer-box {
margin: 10px 0;
padding: 12px 16px;
border-radius: 10px;
background: rgba(0, 212, 255, 0.06);
border: 1px solid rgba(0, 212, 255, 0.12);
display: none;
}
.answer-box.show { display: block; }
.answer-box .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
.answer-box .val { color: #00d4ff; font-weight: 700; font-size: 1rem; }

/* Card actions */
.card-acts { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.card-acts button {
padding: 8px 18px;
border-radius: 10px;
border: none;
font-family: inherit;
font-weight: 700;
font-size: 0.85rem;
cursor: pointer;
transition: all 0.25s;
}
.btn-cy { background: linear-gradient(135deg, #00d4ff, #7c3aed); color: #fff; box-shadow: 0 0 15px rgba(0,212,255,0.2); }
.btn-cy:hover { transform: translateY(-1px); box-shadow: 0 0 25px rgba(0,212,255,0.35); }
.btn-gold { background: linear-gradient(135deg, #ffd700, #ff8800); color: #0a0a1a; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
.btn-gold:hover { transform: translateY(-1px); box-shadow: 0 0 25px rgba(255,215,0,0.35); }
.btn-ghost { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.08); }
.btn-ghost:hover { background: rgba(255,255,255,0.12); color: #fff; }
.btn-ans { background: rgba(0, 255, 136, 0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.15); }
.btn-ans:hover { background: rgba(0, 255, 136, 0.2); }

.msg-box {
text-align: center;
padding: 8px 12px;
border-radius: 10px;
margin: 8px 0;
font-size: 0.95rem;
font-weight: 600;
}
.msg-box.good { background: rgba(0, 255, 136, 0.1); border: 1px solid rgba(0, 255, 136, 0.15); color: #00ff88; }
.msg-box.bad { background: rgba(255, 45, 120, 0.1); border: 1px solid rgba(255, 45, 120, 0.15); color: #ff2d78; }
.msg-box.info { background: rgba(0, 212, 255, 0.08); border: 1px solid rgba(0, 212, 255, 0.1); color: #00d4ff; }

/* Points popup */
.pts-popup {
position: fixed;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
font-family: 'Orbitron', sans-serif;
font-size: clamp(2.5rem, 8vw, 5rem);
font-weight: 900;
color: #ffd700;
text-shadow: 0 0 30px rgba(255,215,0,0.7), 0 0 60px rgba(255,215,0,0.3);
z-index: 10000;
pointer-events: none;
animation: popPts 1.4s ease forwards;
}
@keyframes popPts {
0% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
25% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
55% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
100% { opacity: 0; transform: translate(-50%, -70%) scale(1.1); }
}

/* Emoji guess */
.emoji-big { font-size: clamp(2.2rem, 7vw, 3.5rem); text-align: center; margin: 12px 0; letter-spacing: 6px; }
.emoji-inp {
width: 100%;
padding: 10px 14px;
border-radius: 10px;
border: 1px solid rgba(255,255,255,0.08);
background: rgba(255,255,255,0.04);
color: #fff;
font-family: inherit;
font-size: 0.95rem;
outline: none;
transition: border-color 0.3s;
}
.emoji-inp:focus { border-color: rgba(0, 212, 255, 0.3); }
.hint { font-size: 0.8rem; color: rgba(255,255,255,0.3); font-style: italic; margin-top: 4px; }

/* Rapid Fire */
.rf-q { padding: 10px; margin: 6px 0; border-radius: 10px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
.rf-q-label { font-weight: 600; margin-bottom: 4px; font-size: 0.9rem; }
.rf-opts { display: flex; gap: 5px; flex-wrap: wrap; }
.rf-opts button {
padding: 5px 12px;
border-radius: 7px;
border: 1px solid rgba(255,255,255,0.08);
background: rgba(255,255,255,0.04);
color: #fff;
cursor: pointer;
font-family: inherit;
font-size: 0.8rem;
transition: all 0.2s;
}
.rf-opts button:hover { background: rgba(255,255,255,0.1); }
.rf-opts button.sel { background: rgba(0, 212, 255, 0.15); border-color: #00d4ff; }
.rf-opts button.correct { background: rgba(0, 255, 136, 0.15); border-color: #00ff88; }
.rf-opts button.wrong { background: rgba(255, 45, 120, 0.15); border-color: #ff2d78; }

/* Mystery / Lucky / Double */
.bonus-box { text-align: center; padding: 24px 16px; }
.bonus-icon { font-size: 4rem; margin-bottom: 8px; }
.bonus-text { font-size: 1.15rem; color: rgba(255,255,255,0.8); }

/* Responsive */
@media (max-width: 819px) {
.main-grid { gap: 8px; padding: 6px 8px 60px; }
.glass { padding: 10px 10px; }
.team-row { padding: 4px 6px; }
.team-name-input { max-width: 80px; font-size: 0.8rem; }
.team-emoji { font-size: 1rem; min-width: 22px; }
.challenge-card { padding: 18px 14px; }
.card-acts button { font-size: 0.78rem; padding: 7px 14px; }
.score-btn { width: 22px; height: 22px; font-size: 0.65rem; }
.team-score { width: 34px; font-size: 0.85rem; }
.score-btn.big { width: 24px; }
.score-btn.ok { padding: 0 8px; font-size: 0.65rem; }
}
@media (max-width: 360px) {
.wheel-wrap { width: 92vw; height: 92vw; }
.team-name-input { max-width: 60px; font-size: 0.75rem; }
.team-score { width: 28px; font-size: 0.75rem; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<header class="header">
<h1>🎡 SPIN THE WHEEL</h1>
<p>Challenge • Compete • Conquer</p>
</header>

<div class="main-grid">
<div class="wheel-col">
<div class="wheel-wrap">
<canvas id="wheelCanvas"></canvas>
<div class="pointer"></div>
</div>
<button class="spin-btn" id="spinBtn">▶ SPIN</button>
<div class="segment-display" id="segDisplay">
<span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">Hit SPIN to start!</span>
</div>
</div>

<div class="side-col">
<div class="glass">
<div class="glass-title">⏱ Timer</div>
<div class="timer-row">
<span class="timer-num" id="timerNum">--</span>
<div class="track"><div class="track-fill" id="timerFill"></div></div>
</div>
</div>

<div class="glass">
<div class="glass-title">👥 Teams &amp; Scores</div>
<div class="team-list" id="teamList"></div>
<div style="text-align:center;margin-top:6px;"><span class="turn-badge" id="turnBadge">🎯 <span id="curTeamName">Alpha</span>'s Turn</span></div>
</div>
</div>
</div>

<div class="modal-wrap" id="modalWrap">
<div class="challenge-card" id="card">
<div class="card-head">
<span class="big-icon" id="cardIcon">🎯</span>
<div>
<div class="sub" id="cardSub">CATEGORY</div>
<h2 id="cardTitle">Title</h2>
</div>
</div>
<div id="cardBody"></div>
<div id="cardResult"></div>
<div class="card-acts" id="cardActs"></div>
</div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
// ===== CATEGORIES =====
const CAT = [
{ name:'Simple Question', icon:'💡', color:'#ff2d78' },
{ name:'Hard Question', icon:'🧠', color:'#7c3aed' },
{ name:'Riddle Challenge', icon:'🔮', color:'#00d4ff' },
{ name:'Meme Challenge', icon:'😂', color:'#ff8800' },
{ name:'Rapid Fire', icon:'🔥', color:'#ff6b6b' },
{ name:'Double Points', icon:'✌️', color:'#ffd700' },
{ name:'Team Challenge', icon:'🤝', color:'#00ff88' },
{ name:'Lucky Bonus', icon:'🍀', color:'#38bdf8' },
{ name:'Emoji Guess', icon:'🎬', color:'#a78bfa' },
{ name:'Mystery Box', icon:'🎁', color:'#f472b6' }
];
const COLS = CAT.map(c=>c.color);

// ===== QUESTIONS =====
const simpleQ = [
{q:"What is the capital of Japan?",o:["Tokyo","Seoul","Beijing","Bangkok"],a:0},
{q:"How many continents are there?",o:["5","6","7","8"],a:2},
{q:"Largest ocean on Earth?",o:["Atlantic","Indian","Arctic","Pacific"],a:3},
{q:"Gas plants absorb from atmosphere?",o:["Oxygen","Nitrogen","Carbon Dioxide","Hydrogen"],a:2},
{q:"Closest planet to the Sun?",o:["Venus","Mercury","Earth","Mars"],a:1},
{q:"How many legs does a spider have?",o:["6","8","10","12"],a:1},
{q:"Chemical symbol for water?",o:["H2O","CO2","NaCl","O2"],a:0},
{q:"Fastest land animal?",o:["Lion","Horse","Cheetah","Gazelle"],a:2},

// ===== WHEEL =====
function drawWheel(rot) {
const s = cSize, r = s/2-5, sa = 2*Math.PI/CAT.length;
cx.clearRect(0,0,s,s);
cx.save(); cx.translate(s/2,s/2); cx.rotate(rot);
for(let i=0;i<CAT.length;i++){
const st = -Math.PI/2+i*sa, en = st+sa;
const g = cx.createRadialGradient(0,0,0,0,0,r);
g.addColorStop(0,lighten(COLS[i],45)); g.addColorStop(1,COLS[i]);
cx.beginPath(); cx.moveTo(0,0); cx.arc(0,0,r,st,en); cx.closePath();
cx.fillStyle = g; cx.fill();
cx.strokeStyle = 'rgba(255,255,255,0.08)'; cx.lineWidth=1; cx.stroke();
cx.save(); cx.rotate(st+sa/2); cx.textAlign='right';
cx.fillStyle='#fff';
cx.font=`bold ${s*0.042}px 'Nunito',sans-serif`;
const tr = r*0.7;
const lines = wrapT(CAT[i].name,s*0.055);
for(let j=0;j<lines.length;j++) cx.fillText(lines[j],tr,(j-(lines.length-1)/2)*s*0.045);
cx.restore();
}
const g = cx.createRadialGradient(0,0,0,0,0,r*0.2);
g.addColorStop(0,'#1a0533'); g.addColorStop(0.6,'#0d0d2b'); g.addColorStop(1,'#0a0a1a');
cx.beginPath(); cx.arc(0,0,r*0.2,0,2*Math.PI);
cx.fillStyle=g; cx.fill();
cx.strokeStyle='rgba(255,215,0,0.25)'; cx.lineWidth=2; cx.stroke();
cx.fillStyle='#ffd700'; cx.font=`bold ${s*0.065}px 'Orbitron',sans-serif`;
cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText('SPIN',0,-s*0.01);
cx.fillStyle='rgba(255,255,255,0.2)'; cx.font=`${s*0.028}px 'Nunito',sans-serif`;
cx.fillText('THE WHEEL',0,s*0.06);
cx.restore();
cx.save(); cx.translate(s/2,s/2);
for(let i=0;i<36;i++){
const a=i/36*2*Math.PI, x=(r-3)*Math.cos(a), y=(r-3)*Math.sin(a);
cx.beginPath(); cx.arc(x,y,1.5,0,2*Math.PI);
cx.fillStyle=i%2===0?'rgba(255,215,0,0.2)':'rgba(255,255,255,0.08)';
cx.fill();
} cx.restore();
}
function lighten(h,p){
const n=parseInt(h.replace('#',''),16), a=Math.round(2.55*p);
return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;
}
function wrapT(t,w){
const ws=t.split(' '), ls=[]; let c='';
for(const w of ws){ if((c+' '+w).length*7>w&&c){ ls.push(c); c=w; } else c=c?c+' '+w:w; }
if(c)ls.push(c); return ls.length?ls:[t];
}

// ===== SPIN =====
function spin() {
if(spinning) return;
if(challengeActive){ closeModal(); challengeActive=false; }
spinning=true; spinBtn.disabled=true; spinBtn.textContent='SPINNING...';
segDisp.innerHTML='<span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">🌀 Spinning...</span>';
const ti = Math.floor(Math.random()*CAT.length);
const sa = 2*Math.PI/CAT.length;
const ta = -Math.PI/2-(ti+0.5)*sa;
const fr = (5+Math.floor(Math.random()*4))*2*Math.PI;
const total = fr+ta-(wheelRot%(2*Math.PI));
const start = wheelRot, target = start+total;
const dur = 4000+Math.random()*1000, t0 = performance.now();
playSpin();
function anim(t){
const p = Math.min((t-t0)/dur,1);
const e = 1-Math.pow(1-p,3);
wheelRot = start+total*e; drawWheel(wheelRot);
const passed = Math.floor((wheelRot-start)/sa);
const prev = Math.floor(((wheelRot-sa*0.5)-start)/sa);
if(passed>prev&&p<0.95) playTick();
if(p<1) requestAnimationFrame(anim);
else { wheelRot=target; drawWheel(wheelRot); done(ti); }
}
requestAnimationFrame(anim);
}
function done(idx){
spinning=false; spinBtn.disabled=false; spinBtn.textContent='▶ SPIN';
playLand();
const c=CAT[idx];
segDisp.innerHTML=`<span style="display:flex;align-items:center;gap:6px;"><span style="font-size:1.4rem;">${c.icon}</span><span class="seg-name">${c.name}</span></span>`;
setTimeout(()=>showChallenge(idx),500);
}

});

ansBtn.textContent='👁 View Answers';
ansBtn.addEventListener('click',()=>{
let box = cardBody.querySelector('.answer-box');
if(!box){
box = document.createElement('div'); box.className='answer-box';
box.innerHTML = `<div class="label">Answers</div><div class="val">1. ${answerTexts[0]} | 2. ${answerTexts[1]} | 3. ${answerTexts[2]}</div>`;
cardBody.appendChild(box);
}
box.classList.toggle('show');
});
cardActs.prepend(ansBtn);
startTimer(20,()=>{
const pts = correct*5, a = doubleNext?pts*2:pts;
cardResult.innerHTML=`<div class="msg-box bad">⏰ Time! ${correct}/3 correct +${a} points</div>`;
awardPoints(a);
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
});
}
// ===== DOUBLE POINTS =====
function showDP(){
cardTitle.textContent='✌️ Double Points';
cardBody.innerHTML=`<div class="bonus-box"><div class="bonus-icon">✌️</div><div class="bonus-text" style="color:#ffd700;font-weight:700;">Your NEXT challenge scores DOUBLE!</div></div>`;
cardResult.innerHTML='';
cardActs.innerHTML=`<button class="btn-gold" onclick="activateDP()">Activate Double Points!</button><button class="btn-ghost" onclick="closeModal();challengeActive=false;advanceTurn();">Skip</button>`;
}
window.activateDP = function(){
doubleNext=true; closeModal(); challengeActive=false; spin();
};
// ===== TEAM CHALLENGE =====
function showTC(){
const t = teamQs[Math.floor(Math.random()*teamQs.length)];
const team = teams[curTeam];
cardTitle.textContent=`🤝 ${team.emoji} ${team.name} Challenge`;
cardBody.innerHTML=`<div class="card-q">${t.q}</div><div style="padding:10px;border-radius:10px;background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.08);margin:6px 0;"><span style="color:#00ff88;font-weight:600;">Work together as a team!</span></div>`;
cardResult.innerHTML='';
cardActs.innerHTML=`<button class="btn-cy" id="tcDone">Completed!</button><button class="btn-ghost" onclick="closeModal();challengeActive=false;advanceTurn();">Skip</button>`;
document.getElementById('tcDone').addEventListener('click',function(){
const a = doubleNext?50:25;
cardResult.innerHTML=`<div class="msg-box good">Teamwork! +${a} points</div>`;
awardPoints(a); clearTimer(); this.disabled=true;
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
});
startTimer(45,()=>{
document.getElementById('tcDone').disabled=true;
cardResult.innerHTML=`<div class="msg-box bad">Time's up!</div>`;
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
});
}
// ===== LUCKY BONUS =====
function showLB(){
const l = luckyB[Math.floor(Math.random()*luckyB.length)];
cardTitle.textContent='Lucky Bonus!';
cardBody.innerHTML=`<div class="bonus-box"><div class="bonus-icon">🍀</div><div class="bonus-text">${l.text}</div></div>`;
cardResult.innerHTML='';
cardActs.innerHTML=`<button class="btn-gold" onclick="claimLucky(${l.pts})">Claim +${l.pts}!</button>`;
}
window.claimLucky = function(pts){
awardPoints(pts);
cardResult.innerHTML=`<div class="msg-box good">+${pts} bonus points!</div>`;
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
};
// ===== EMOJI GUESS =====
function showEG(){
const e = emojis[Math.floor(Math.random()*emojis.length)];
cardTitle.textContent='Emoji Guess';
cardBody.innerHTML=`<div class="emoji-big">${e.em}</div><div class="hint">💡 ${e.hint}</div><input type="text" class="emoji-inp" id="emojiInp" placeholder="Type your answer..." autocomplete="off"><div class="answer-box" id="egAns"><div class="label">Answer</div><div class="val">${e.a}</div></div>`;
cardResult.innerHTML='';
cardActs.innerHTML=`<button class="btn-cy" id="egSub">Submit</button><button class="btn-ans" id="egRev">👁 View Answer</button><button class="btn-ghost" id="egSkip">Skip</button>`;
document.getElementById('egSub').addEventListener('click',function(){
const inp = document.getElementById('emojiInp');
if(inp.value.trim().toLowerCase()===e.a.toLowerCase()){
const a = doubleNext?30:15; cardResult.innerHTML=`<div class="msg-box good">Correct! +${a} points</div>`;
awardPoints(a); clearTimer(); this.disabled=true;
document.getElementById('egAns').classList.add('show');
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
} else {
inp.style.borderColor='#ff2d78'; cardResult.innerHTML=`<div class="msg-box bad">Not quite! Try again or view answer.</div>`;
setTimeout(()=>inp.style.borderColor='rgba(255,255,255,0.08)',1500);
}
});
document.getElementById('egRev').addEventListener('click',function(){
document.getElementById('egAns').classList.toggle('show');
});
document.getElementById('egSkip').onclick=()=>{closeModal();challengeActive=false;advanceTurn();};
startTimer(25,()=>{
document.getElementById('egSub').disabled=true; document.getElementById('egAns').classList.add('show');
cardResult.innerHTML=`<div class="msg-box bad">Time's up! Answer: ${e.a}</div>`;
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
});
}
// ===== MYSTERY BOX =====
function showMX(){
const m = mxBox[Math.floor(Math.random()*mxBox.length)];
cardTitle.textContent='Mystery Box!';
cardBody.innerHTML=`<div class="bonus-box"><div class="bonus-icon" style="animation:bounceM 0.5s ease infinite alternate;">🎁</div><div class="bonus-text">Click to reveal!</div></div>
<style>@keyframes bounceM{from{transform:translateY(0)}to{transform:translateY(-8px)}}</style>`;
cardResult.innerHTML='';
cardActs.innerHTML=`<button class="btn-gold" id="openMx">Open Mystery Box!</button>`;
document.getElementById('openMx').addEventListener('click',function(){
this.disabled=true; this.textContent='Opening...';
if(m.sp==='double'){ cardResult.innerHTML=`<div class="msg-box info">Double Next Score!</div>`; doubleNext=true; }
else if(m.sp==='extra'){ cardResult.innerHTML=`<div class="msg-box info">Extra Turn!</div>`; extraTurn=true; }
else { awardPoints(m.pts); cardResult.innerHTML=`<div class="msg-box good">${m.text}</div>`; }
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
});
}

// ===== POINTS & TEAMS =====
function awardPoints(pts){
teams[curTeam].score += pts;
playWin(); triggerConfetti(); renderTeams(); popPts(`+${pts}`);
}
function popPts(t){
const el = document.createElement('div'); el.className='pts-popup'; el.textContent=t;
document.body.appendChild(el); setTimeout(()=>el.remove(),1500);
}
function renderTeams(){
teamList.innerHTML='';
teams.forEach((t,i)=>{
const row = document.createElement('div');
row.className = 'team-row'+(i===curTeam?' active':'')+(isLdr(i)?' leader-row':'');
const em = document.createElement('span'); em.className='team-emoji'; em.textContent=t.emoji;
const inp = document.createElement('input'); inp.className='team-name-input'; inp.value=t.name;
inp.placeholder='Team name'; inp.maxLength=16;
inp.addEventListener('input',()=>{ t.name=inp.value||'?'; updateTurn(); });
const sg = document.createElement('div'); sg.className='score-group';
const sc = document.createElement('input'); sc.type='number'; sc.className='team-score'; sc.value=t.score;
sc.addEventListener('input',()=>{ t.score=parseInt(sc.value)||0; renderTeams(); });
const m5 = mkSB('-5','minus big',()=>{ t.score=Math.max(0,t.score-5); renderTeams(); });
const m1 = mkSB('-1','minus',()=>{ t.score=Math.max(0,t.score-1); renderTeams(); });
const p1 = mkSB('+1','plus',()=>{ t.score+=1; renderTeams(); });
const p5 = mkSB('+5','plus big',()=>{ t.score+=5; renderTeams(); });
sg.append(m5,m1,sc,p1,p5);
row.append(em,inp,sg);
teamList.appendChild(row);
});
const mx = Math.max(...teams.map(t=>t.score));
document.querySelectorAll('.team-row').forEach((r,i)=>{
if(mx>0 && teams[i].score===mx) r.classList.add('leader-row');
});
updateTurn();
}
function mkSB(txt,cls,fn){
const b=document.createElement('button'); b.className=`score-btn ${cls}`; b.textContent=txt;
b.addEventListener('click',fn); return b;
}
function isLdr(i){
const mx = Math.max(...teams.map(t=>t.score));
return mx>0 && teams[i].score===mx;
}
function updateTurn(){
curTeamName.textContent = `${teams[curTeam].emoji} ${teams[curTeam].name}`;
}
function advanceTurn(){
if(extraTurn){ extraTurn=false; return; }
doubleNext=false;
curTeam = (curTeam+1) % teams.length;
updateTurn();
segDisp.innerHTML=`<span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">🎯 ${teams[curTeam].emoji} ${teams[curTeam].name}'s turn!</span>`;
}

// ===== TIMER =====
let tmr = null;
function startTimer(sec,onEnd){
clearTimer(); let r=sec;
timerNum.textContent=r; timerNum.className='timer-num';
timerFill.style.width='100%'; timerFill.className='track-fill';
tmr=setInterval(()=>{ r--; timerNum.textContent=r;
timerFill.style.width=(r/sec)*100+'%';
if(r<=5){ timerNum.classList.add('track-warn'); timerFill.classList.add('track-fill-danger'); }
else if(r<=10){ timerFill.classList.add('track-fill-warn'); }
if(r<=0){ clearTimer(); onEnd(); }
},1000);
}
function clearTimer(){
if(tmr){ clearInterval(tmr); tmr=null; }
timerNum.textContent='--'; timerNum.className='timer-num';
timerFill.style.width='100%'; timerFill.className='track-fill';
}
function timeUp(){
cardResult.innerHTML=`<div class="msg-box bad">Time's up!</div>`;
cardActs.innerHTML=`<button class="btn-gold" onclick="closeModal();challengeActive=false;advanceTurn();">Continue</button>`;
}

// ===== SOUNDS =====
let actx = null;
function ax(){ if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }
function playSpin(){ try{
const c=ax(), o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination);
o.type='sawtooth'; o.frequency.setValueAtTime(300,c.currentTime);
o.frequency.exponentialRampToValueAtTime(1200,c.currentTime+0.3);
o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.6);
g.gain.setValueAtTime(0.06,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.6);
o.start(c.currentTime); o.stop(c.currentTime+0.6);
}catch(e){} }
function playTick(){ try{
const c=ax(), o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination);
o.type='sine'; o.frequency.setValueAtTime(2000,c.currentTime);
g.gain.setValueAtTime(0.03,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.04);
o.start(c.currentTime); o.stop(c.currentTime+0.04);
}catch(e){} }
function playWin(){ try{
const c=ax(); [523.25,659.25,783.99,1046.5].forEach((f,i)=>{
const o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination);
o.type='sine'; o.frequency.setValueAtTime(f,c.currentTime+i*0.12);
g.gain.setValueAtTime(0,c.currentTime+i*0.12);
g.gain.linearRampToValueAtTime(0.1,c.currentTime+i*0.12+0.04);
g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.12+0.2);
o.start(c.currentTime+i*0.12); o.stop(c.currentTime+i*0.12+0.2);
});
}catch(e){} }
function playLand(){ try{
const c=ax();
const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination);
o.type='triangle'; o.frequency.setValueAtTime(440,c.currentTime);
o.frequency.exponentialRampToValueAtTime(880,c.currentTime+0.12);
g.gain.setValueAtTime(0.12,c.currentTime); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
o.start(c.currentTime); o.stop(c.currentTime+0.25);
const o2=c.createOscillator(),g2=c.createGain(); o2.connect(g2); g2.connect(c.destination);
o2.type='sine'; o2.frequency.setValueAtTime(100,c.currentTime+0.08);
g2.gain.setValueAtTime(0.18,c.currentTime+0.08); g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.25);
o2.start(c.currentTime+0.08); o2.stop(c.currentTime+0.25);
}catch(e){} }

// ===== CONFETTI =====
let cpieces = [], caid = null;
function triggerConfetti(n=100){
setupConfetti();
for(let i=0;i<n;i++) cpieces.push({
x:Math.random()*confettiCv.width, y:Math.random()*confettiCv.height*-1-10,
w:4+Math.random()*6, h:3+Math.random()*4,
vx:(Math.random()-0.5)*3, vy:1.5+Math.random()*4,
color:['#ff2d78','#7c3aed','#00d4ff','#ffd700','#ff8800','#00ff88','#38bdf8','#a78bfa','#f472b6'][Math.floor(Math.random()*9)],
rot:Math.random()*360, rs:(Math.random()-0.5)*12, op:1, g:0.06+Math.random()*0.04
});
if(!caid) animC();
}
function animC(){
cCtx.clearRect(0,0,confettiCv.width,confettiCv.height);
let alive=false;
for(const p of cpieces){
p.x+=p.vx; p.vy+=p.g; p.y+=p.vy; p.rot+=p.rs; p.op-=0.004;
if(p.op>0&&p.y<confettiCv.height+20){
alive=true; cCtx.save(); cCtx.translate(p.x,p.y);
cCtx.rotate(p.rot*Math.PI/180); cCtx.globalAlpha=Math.max(0,p.op);
cCtx.fillStyle=p.color; cCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cCtx.restore();
}
}
cpieces=cpieces.filter(p=>p.op>0&&p.y<confettiCv.height+20);
if(alive||cpieces.length) caid=requestAnimationFrame(animC);
else{ caid=null; cCtx.clearRect(0,0,confettiCv.width,confettiCv.height); }
}

// ===== EVENTS =====
window.addEventListener('resize',()=>{ setupCanvas(); setupConfetti(); });
document.addEventListener('click',()=>ax(),{once:true});
spinBtn.addEventListener('click',spin);
cv.addEventListener('click',()=>{ if(!spinning&&!challengeActive) spin(); });
modalWrap.addEventListener('click',function(e){
if(e.target===this && !spinning && challengeActive){
const noClose = ['double points','rapid fire'].some(k=>cardSub.textContent.toLowerCase().includes(k));
if(!noClose){ closeModal(); challengeActive=false; advanceTurn(); }
}
});

// ===== INIT =====
function init(){
setupCanvas(); setupConfetti(); renderTeams();
timerNum.textContent='--';
segDisp.innerHTML=`<span style="color:rgba(255,255,255,0.3);font-size:0.8rem;">${teams[0].emoji} ${teams[0].name}'s turn!</span>`;
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
